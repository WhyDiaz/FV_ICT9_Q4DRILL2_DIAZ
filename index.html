<body>

    <script>

        function teamRank(){
            var rank = "1st";

            message = "";

            switch (true){
                case (rank === "1st") :
                    alert("Champion!");
                    break;
                case (rank === "2nd") :
                    alert("Second Place!");
                    break;
                case (rank === "3rd") :
                    alert("Third Place!");
                    break;
                case (rank === "4th")  :
                    alert("Fourth Place!");
                    break;    
                default :
                message = ("Rank could not be determined");
            }
               alert(message);
        }
    </script>
